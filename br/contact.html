<form action="https://api.web3forms.com/submit" method="POST" class="contact-form" style="background: #f9f9f9; padding: 30px; border-radius: 15px;">
    
    <input type="hidden" name="access_key" value="fda840e3-c1fd-4081-a1e1-ac150b089267">

    <div style="margin-bottom: 15px;">
        <label>Seu nome</label>
        <input type="text" name="name" style="width: 100%; padding: 10px; margin-top: 5px;" required>
    </div>
    <div style="margin-bottom: 15px;">
        <label>E-mail</label>
        <input type="email" name="email" style="width: 100%; padding: 10px; margin-top: 5px;" required>
    </div>
    <div style="margin-bottom: 15px;">
        <label>Mensagem</label>
        <textarea name="message" style="width: 100%; padding: 10px; margin-top: 5px; height: 120px;" required></textarea>
    </div>
    <button type="submit" style="background: var(--laranja-maker); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer;">Enviar Mensagem</button>
</form>
