<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lançamento | Maker Jogos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="content-wrapper">
        <section class="launch-hero container">
            <div class="launch-info">
                <span class="badge-new">EM BREVE</span>
                <h1>O próximo desafio está chegando</h1>
                <p>Prepare-se para uma nova mecânica de jogo. "Projeto Ômega" é nosso lançamento mais ambicioso.</p>
                
                <div id="countdown" class="countdown-box">
                    <div><span id="days">00</span><span>Dias</span></div>
                    <div><span id="hours">00</span><span>Horas</span></div>
                </div>

                <div class="launch-actions">
                    <a href="#" class="btn-primary">Entrar na Lista de Espera</a>
                </div>
            </div>
            <div class="launch-mockup">
                <div class="placeholder-img">Imagem do Jogo</div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="js/main.js"></script>
</body>
</html>
